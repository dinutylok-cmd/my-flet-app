name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install flet
          
      - name: Build APK
        run: |
          # Добавляем --yes, чтобы он не спрашивал про установку Flutter
          flet build apk --yes
          
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/apk/*.apk
